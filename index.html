<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS-TIMER-PRO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="algorithm-panel">
        <div class="algorithm-container">
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
          <div class="move-container"></div>
        </div>
      </section>

      <div class="main-container">
        <section class="timing-container">
          <div class="time-card">
            <div class="time">0.00</div>
          </div>

          <div class="average-container">
            <div class="avg" data-label="PB">
              <div class="pb avg-num">--:--.--</div>
            </div>
            <div class="avg" data-label="PW">
              <div class="pw avg-num">--:--.--</div>
            </div>
            <div class="avg" data-label="AO5">
              <div class="ao5 avg-num">--:--.--</div>
            </div>
            <div class="avg" data-label="AO12">
              <div class="ao12 avg-num">--:--.--</div>
            </div>
          </div>
        </section>

        <section class="stats-container">
          <div class="statistics"></div>
          <div class="btn">
            <button type="button" class="reset-btn">Reset Session</button>
          </div>
        </section>
      </div>

    </main>
    <script src="app.js"></script>
  </body>
</html>
